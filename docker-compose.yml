services:
  routeexit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8024:8024"
    container_name: routeexit-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8024/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

